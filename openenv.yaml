spec_version: 1
name: devenv_resolver
version: 1.0.0
description: "A stateful SRE environment where agents resolve dependency conflicts, fix broken package trees, and remediate permission errors."
type: space
runtime: fastapi
app: server.app:app
port: 7860
tags:
  - openenv
  - sre
  - devops
tasks:
  - id: easy
    description: "Diagnose and install a missing dependency."
    grader: server.graders.grade_easy
  - id: medium
    description: "Resolve a strict version conflict requiring a downgrade."
    grader: server.graders.grade_medium
  - id: hard
    description: "Remediate broken file permissions causing a silent crash."
    grader: server.graders.grade_hard
